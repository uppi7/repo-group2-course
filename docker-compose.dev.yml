# 【本地开发环境】三个服务统一用 Docker 管理
version: "3.9"

services:

  # ---- 数据库（端口 3307，与 group1 的 3306 错开）----
  mysql-course-dev:
    image: mysql:8.0
    container_name: mysql-course-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: db_course
    ports:
      - "3307:3306"
    volumes:
      - mysql_course_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASS}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- 后端（源码热重载）----
  backend-course-dev:
    build: ./backend
    container_name: backend-course-dev
    volumes:
      - ./backend:/app
    environment:
      DB_HOST: mysql-course-dev
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: db_course
      FLASK_DEBUG: "true"
      BASE_INFO_API_URL: ${BASE_INFO_API_URL}
    extra_hosts:
      # 让容器内可以用 host.docker.internal 访问宿主机
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    depends_on:
      mysql-course-dev:
        condition: service_healthy

  # ---- 前端（Vite HMR）----
  frontend-course-dev:
    image: node:20-alpine
    container_name: frontend-course-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules_course:/app/node_modules
    environment:
      VITE_BACKEND_URL: http://backend-course-dev:8082
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend-course-dev

volumes:
  mysql_course_dev_data:
  node_modules_course:
